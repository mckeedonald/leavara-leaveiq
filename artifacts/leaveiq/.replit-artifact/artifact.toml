kind = "web"
previewPath = "/"
title = "Levara LeaveIQ"
version = "1.0.0"
id = "artifacts/leaveiq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19148

[services.development]
run = "pnpm --filter @workspace/leaveiq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leaveiq", "run", "build" ]
publicDir = "artifacts/leaveiq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19148"
BASE_PATH = "/"
